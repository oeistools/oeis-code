name: docs
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs]"
      - run: mkdocs gh-deploy --force
