name: Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        
    - name: Install Ruff
      run: |
        python -m pip install ruff
        
    - name: Run Ruff check
      run: ruff check .
      
    - name: Run Ruff format check
      run: ruff format --check .
