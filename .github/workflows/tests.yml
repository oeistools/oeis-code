name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev libgmp-dev libpari-dev pari-gp
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [[ "${{ matrix.python-version }}" != "3.12" ]]; then
          # cypari2 < 2.2.0 (for Python < 3.12) is incompatible with Cython 3+
          # Using PIP_CONSTRAINT ensures this is respected even in isolated builds
          echo "cython<3.0" > constraints.txt
          export PIP_CONSTRAINT=constraints.txt
        fi
        pip install .[test,pari]
        
    - name: Run tests
      run: |
        pytest

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
